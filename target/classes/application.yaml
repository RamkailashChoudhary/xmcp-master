spring:
  application:
    name: xmcp
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        model: claude-opus-4-8
    mcp:
      client:
        enabled: true
        name: x-docs-client
        version: 1.0.0
        request-timeout: 30s
        type: SYNC
        # Demo 1: the X docs MCP server is a plain remote endpoint. No auth, no bridge.
        streamable-http:
          connections:
            x-docs:
              url: https://docs.x.com   # -> https://docs.x.com/mcp
            # Demo 2 (live X API): same streamable-http transport, app-only Bearer
            # auth — no bridge. Needs X_BEARER_TOKEN set (app-only token from the X
            # developer portal, Keys and tokens). The Authorization header is added
            # by the McpClientCustomizer in XApiAuthConfig, scoped to this "x-api"
            # connection; the no-auth x-docs connection is left untouched.
            x-api:
              url: https://api.x.com    # -> https://api.x.com/mcp

logging:
  level:
    dev.danvega: INFO
    org.springframework.ai: INFO
    # Logs "Executing tool call: <name>" for each tool the model invokes
    org.springframework.ai.model.tool.DefaultToolCallingManager: DEBUG

